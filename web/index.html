<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loremaster</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --panel-2: #1c222b;
      --text: #d8dee9;
      --muted: #8b95a5;
      --accent: #c9a96e;
      --accent-soft: rgba(201, 169, 110, 0.18);
      --sem: #6fa8dc;
      --epi: #b58e6c;
      --border: #232a36;
      --error: #d97b7b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Iowan Old Style", "Charter", Cambria, Georgia, serif;
      font-size: 16px;
      line-height: 1.55;
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-family: "Inter", "Segoe UI", sans-serif;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    header .session-id {
      font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
    }
    header .spacer { flex: 1; }
    header button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    header button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    header button:disabled { opacity: 0.4; cursor: default; }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      height: calc(100vh - 53px);
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; height: auto; }
    }

    .chat {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--border);
    }
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }
    .turn { margin-bottom: 20px; }
    .turn .who {
      font-family: "Inter", "Segoe UI", sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .turn.player .who { color: var(--accent); }
    .turn .body {
      white-space: pre-wrap;
      font-size: 16px;
    }
    .turn.player .body { color: #e6ebf3; }
    .turn.gm .body { color: var(--text); }
    .turn.note .body { color: var(--muted); font-style: italic; }
    .turn.error .body { color: var(--error); }

    form.composer {
      display: flex;
      gap: 8px;
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }
    form.composer textarea {
      flex: 1;
      resize: none;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.4;
      min-height: 44px;
      max-height: 200px;
    }
    form.composer textarea:focus { outline: none; border-color: var(--accent); }
    form.composer button {
      background: var(--accent);
      color: #1b1408;
      border: 0;
      border-radius: 6px;
      padding: 0 18px;
      font-family: "Inter", "Segoe UI", sans-serif;
      font-weight: 600;
      cursor: pointer;
    }
    form.composer button:disabled { opacity: 0.4; cursor: default; }

    aside.memory {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--panel);
    }
    aside.memory header {
      border-bottom: 1px solid var(--border);
      background: transparent;
      padding: 14px 18px;
      flex-shrink: 0;
    }
    aside.memory h2 {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: "Inter", "Segoe UI", sans-serif;
      font-weight: 600;
    }
    aside.memory .description {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 4px;
    }
    .memory-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
    }
    .memory-empty {
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }
    .mem-item {
      padding: 10px 12px;
      margin-bottom: 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      border-left: 3px solid transparent;
    }
    .mem-item.semantic { border-left-color: var(--sem); }
    .mem-item.episodic { border-left-color: var(--epi); }
    .mem-item .meta {
      display: flex;
      gap: 12px;
      font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .mem-item .meta .kind {
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--accent-soft);
      color: var(--accent);
      letter-spacing: 0.08em;
    }
    .mem-item .meta .kind.semantic { background: rgba(111, 168, 220, 0.18); color: var(--sem); }
    .mem-item .meta .kind.episodic { background: rgba(181, 142, 108, 0.18); color: var(--epi); }
    .mem-item .content { font-size: 13.5px; line-height: 1.5; }

    .working { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>LOREMASTER</h1>
    <span class="session-id" id="session-id">no campaign yet</span>
    <span class="spacer"></span>
    <button id="btn-consolidate" title="Distil recent events into durable canon">Consolidate</button>
    <button id="btn-new">New campaign</button>
  </header>
  <main>
    <section class="chat">
      <div class="log" id="log"></div>
      <form class="composer" id="composer">
        <textarea id="input" rows="2"
                  placeholder="Describe what you do, or ask the GM a question."
                  autocomplete="off"></textarea>
        <button type="submit" id="send">Send</button>
      </form>
    </section>
    <aside class="memory">
      <header>
        <h2>Retrieved memory</h2>
        <div class="description">
          Facts pulled from the campaign canon to ground the GM&rsquo;s last reply.
          Blue items are consolidated semantic facts; brown items are raw episodic events.
        </div>
      </header>
      <div class="memory-list" id="memory">
        <div class="memory-empty">No memory retrieved yet. Take a turn.</div>
      </div>
    </aside>
  </main>

  <script>
    const API = window.location.origin;
    const $ = (id) => document.getElementById(id);
    const log = $("log");
    const composer = $("composer");
    const input = $("input");
    const send = $("send");
    const btnNew = $("btn-new");
    const btnConsolidate = $("btn-consolidate");
    const sessionLabel = $("session-id");
    const memoryPanel = $("memory");

    let sessionId = null;
    let busy = false;

    function setBusy(state) {
      busy = state;
      send.disabled = state || !sessionId;
      btnNew.disabled = state;
      btnConsolidate.disabled = state || !sessionId;
      input.disabled = state || !sessionId;
    }

    function appendTurn(role, body) {
      const wrap = document.createElement("div");
      wrap.className = `turn ${role}`;
      const who = document.createElement("div");
      who.className = "who";
      who.textContent =
        role === "player" ? "You" :
        role === "gm"     ? "Game Master" :
        role === "error"  ? "Error" :
                            "Note";
      const text = document.createElement("div");
      text.className = "body";
      text.textContent = body;
      wrap.appendChild(who);
      wrap.appendChild(text);
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
      return wrap;
    }

    function setMemory(items) {
      memoryPanel.innerHTML = "";
      if (!items || items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "memory-empty";
        empty.textContent = "Nothing retrieved on the last turn.";
        memoryPanel.appendChild(empty);
        return;
      }
      for (const m of items) {
        const item = document.createElement("div");
        item.className = `mem-item ${m.kind}`;
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `
          <span class="kind ${m.kind}">${m.kind === "semantic" ? "SEM" : "EPI"}</span>
          <span>score ${m.score.toFixed(3)}</span>
          <span>imp ${m.importance}</span>
        `;
        const content = document.createElement("div");
        content.className = "content";
        content.textContent = m.content;
        item.appendChild(meta);
        item.appendChild(content);
        memoryPanel.appendChild(item);
      }
    }

    async function api(path, options = {}) {
      const opts = {
        method: options.method || "GET",
        headers: { "Content-Type": "application/json" },
      };
      if (options.body !== undefined) opts.body = JSON.stringify(options.body);
      const response = await fetch(API + path, opts);
      if (!response.ok) {
        const detail = await response.text();
        throw new Error(`${response.status} ${response.statusText}: ${detail}`);
      }
      return response.json();
    }

    async function newCampaign() {
      setBusy(true);
      log.innerHTML = "";
      setMemory([]);
      const pending = appendTurn("note", "Game Master is opening the scene...");
      try {
        const data = await api("/sessions", {
          method: "POST",
          body: { working_window: 6 },
        });
        sessionId = data.session_id;
        sessionLabel.textContent = sessionId;
        pending.remove();
        appendTurn("gm", data.opening_scene);
      } catch (err) {
        pending.remove();
        appendTurn("error", err.message);
      } finally {
        setBusy(false);
        input.focus();
      }
    }

    async function takeTurn(message) {
      if (!sessionId) return;
      appendTurn("player", message);
      setBusy(true);
      const pending = appendTurn("note", "Game Master is writing...");
      try {
        const data = await api(`/sessions/${sessionId}/turn`, {
          method: "POST",
          body: { message },
        });
        pending.remove();
        appendTurn("gm", data.reply);
        setMemory(data.retrieved);
      } catch (err) {
        pending.remove();
        appendTurn("error", err.message);
      } finally {
        setBusy(false);
        input.focus();
      }
    }

    async function consolidate() {
      if (!sessionId) return;
      setBusy(true);
      const pending = appendTurn("note", "Consolidating canon into semantic facts...");
      try {
        const data = await api(`/sessions/${sessionId}/consolidate`, { method: "POST" });
        pending.remove();
        const count = data.facts.length;
        appendTurn(
          "note",
          count === 0
            ? "Consolidation produced no new facts."
            : `Consolidated ${count} semantic fact${count === 1 ? "" : "s"}.`
        );
      } catch (err) {
        pending.remove();
        appendTurn("error", err.message);
      } finally {
        setBusy(false);
      }
    }

    composer.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || busy) return;
      input.value = "";
      takeTurn(text);
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        composer.requestSubmit();
      }
    });
    btnNew.addEventListener("click", newCampaign);
    btnConsolidate.addEventListener("click", consolidate);

    // Auto-start a campaign so the demo lands somewhere interesting.
    newCampaign();
  </script>
</body>
</html>
