services:
  db:
    image: pgvector/pgvector:pg16
    container_name: loremaster-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loremaster}
      POSTGRES_USER: ${POSTGRES_USER:-loremaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loremaster}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    name: loremaster-pgdata
